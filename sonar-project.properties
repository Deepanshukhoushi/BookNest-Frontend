sonar.projectKey=Deepanshukhoushi_BookNest-Frontend
sonar.organization=deepanshukhoushi
sonar.projectName=Booknest Frontend
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.spec.ts,src/environments/**,dist/**,coverage/**
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/booknest-frontend-app/lcov.info
sonar.typescript.lcov.reportPaths=coverage/booknest-frontend-app/lcov.info
# sonar.host.url and sonar.token must be set via environment variables:
#   SONAR_HOST_URL=http://localhost:9000   (or your CI server URL)
#   SONAR_TOKEN=your_token_here
# Or pass them directly:  sonar-scanner -Dsonar.host.url=... -Dsonar.token=...
