<footer class="footer">
  <div class="max-width-container footer-inner">
    <!-- Bottom Bar V2 (Now the primary footer) -->
    <div class="footer-bottom-v2">
      <div class="footer-item copyright">
        © {{ currentYear }} BookNest, Inc. All rights reserved.
      </div>
      
      <div class="footer-separator"></div>

      <a routerLink="/about" class="footer-item about-link">
        <span class="material-symbols-outlined icon">info</span>
        <span>About Us</span>
      </a>

      <div class="footer-separator"></div>

      <div class="footer-item feature">
        <span class="material-symbols-outlined icon">verified_user</span>
        <div class="feature-text">
          <span>Secure</span>
          <span>Payments</span>
        </div>
      </div>

      <div class="footer-separator"></div>

      <div class="footer-item feature">
        <span class="material-symbols-outlined icon">local_shipping</span>
        <div class="feature-text">
          <span>Worldwide</span>
          <span>Delivery</span>
        </div>
      </div>

      <div class="footer-separator"></div>

      <div class="footer-item feature">
        <span class="material-symbols-outlined icon">headset_mic</span>
        <div class="feature-text">
          <span>Dedicated</span>
          <span>Support</span>
        </div>
      </div>

      <div class="footer-separator"></div>

      <button class="footer-item back-to-top" (click)="scrollToTop()">
        <div class="circle-icon">
          <span class="material-symbols-outlined">arrow_upward</span>
        </div>
        <span>Back to top</span>
      </button>

      <div class="footer-separator"></div>

      <div class="footer-item crafted-text">
        <span>Crafted with care<br>for readers who care.</span>
        <span class="material-symbols-outlined heart-icon">favorite</span>
      </div>
    </div>
  </div>
</footer>
