name: BookNest Frontend CI/CD

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  deploy:
    needs: test-and-analyze
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        if: github.ref == 'refs/heads/dev'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create project directory if it doesn't exist
            mkdir -p ~/booknest-app
            cd ~/booknest-app

            # Clone or Pull Frontend
            if [ ! -d "booknest-frontend" ]; then
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Deepanshukhoushi/BookNest-Frontend.git booknest-frontend
            fi
            cd booknest-frontend
            git checkout dev
            git pull https://x-access-token:${{ secrets.GH_PAT }}@github.com/Deepanshukhoushi/BookNest-Frontend.git dev
            
            # Clone Backend if not present (needed for docker-compose.yml)
            cd ..
            if [ ! -d "booknest-backend" ]; then
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/Deepanshukhoushi/BookNest-Backend.git booknest-backend
            fi
            
            # Build and restart only the frontend container
            cd booknest-backend
            docker compose up -d --build booknest-frontend
